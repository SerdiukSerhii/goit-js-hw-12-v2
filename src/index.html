<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>goit-js-hw-12</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <main>
      <div class="container">
        <form class="form js-form">
          <label class="label-form">
            <input
              class="input-search"
              type="text"
              name="search-text"
              placeholder="Search images..."
              required
            />
          </label>
          <button class="btn btn-search js-btn-search" type="submit">
            Search
          </button>
        </form>
      </div>

      <ul class="container gallery js-gallery"></ul>

      <div class="container btn-load-more-container">
        <button class="btn btn-load-more js-load-more" type="button">
          Load more
        </button>
        <span class="loader"></span>
      </div>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
